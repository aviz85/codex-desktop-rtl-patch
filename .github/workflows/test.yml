name: test

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tests/rtl-direction.test.js

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x macos/*.sh tests/*.sh
      - run: for file in macos/*.sh; do bash -n "$file"; done
      - run: tests/macos-fail-open.test.sh
      - run: tests/macos-build-lock.test.sh
      - run: tests/macos-safety-contract.test.sh

  windows-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse install.ps1 and uninstall.ps1 (syntax only, no execution)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'uninstall.ps1')) {
            Write-Host "Parsing $file"
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file), [ref]$null, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              throw "$($errors.Count) syntax error(s) in $file"
            }
            Write-Host "OK $file has no syntax errors"
          }
